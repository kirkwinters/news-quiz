<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Quiz — May 18, 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 6px;
      font-size: 0.9rem;
      color: #555;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      max-width: 660px;
      width: 100%;
      padding: 36px 40px;
    }

    .progress-bar-wrap {
      height: 6px;
      background: #e8e8e4;
      border-radius: 99px;
      margin-bottom: 28px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #2563eb;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .question-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #2563eb;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .choice-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      border: 2px solid #e0e0db;
      border-radius: 10px;
      background: #fafaf8;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
      line-height: 1.4;
    }

    .choice-btn:hover:not(:disabled) {
      border-color: #2563eb;
      background: #eff4ff;
    }

    .choice-btn .letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #e8e8e4;
      font-size: 0.8rem;
      font-weight: 700;
      color: #444;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }

    .choice-btn.correct { border-color: #16a34a; background: #f0fdf4; }
    .choice-btn.correct .letter { background: #16a34a; color: #fff; }

    .choice-btn.wrong { border-color: #dc2626; background: #fef2f2; }
    .choice-btn.wrong .letter { background: #dc2626; color: #fff; }

    .choice-btn.reveal-correct { border-color: #16a34a; background: #f0fdf4; opacity: 0.72; }
    .choice-btn.reveal-correct .letter { background: #16a34a; color: #fff; }

    .choice-btn:disabled { cursor: default; }

    .feedback {
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 0.92rem;
      line-height: 1.55;
      display: none;
    }

    .feedback.show { display: block; }
    .feedback.correct-fb { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .feedback.wrong-fb   { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }

    .next-btn {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: none;
      transition: background 0.15s;
    }

    .next-btn:hover { background: #1d4ed8; }
    .next-btn.show { display: block; }

    /* Results */
    .results { display: none; text-align: center; }
    .results.show { display: block; }

    .score-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #eff4ff;
      border: 4px solid #2563eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .score-circle .score-num {
      font-size: 2.2rem;
      font-weight: 800;
      color: #2563eb;
      line-height: 1;
    }

    .score-circle .score-denom {
      font-size: 0.85rem;
      color: #555;
      font-weight: 600;
    }

    .results h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; }
    .results p  { font-size: 0.95rem; color: #555; margin-bottom: 28px; }

    .retake-btn {
      padding: 13px 36px;
      background: #1a1a1a;
      color: #fff;
      font-size: 0.97rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .retake-btn:hover { background: #333; }

    footer {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #888;
      text-align: center;
    }

    @media (max-width: 520px) {
      .card { padding: 24px 20px; }
      header h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Today's News Quiz</h1>
    <p>May 18, 2026 &mdash; How well do you know today's top stories?</p>
  </header>

  <div class="card" id="quiz-card">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div id="question-area">
      <div class="question-label" id="q-label">Question 1</div>
      <div class="question-text" id="q-text"></div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="next-btn">Continue &rarr;</button>
    </div>

    <div class="results" id="results">
      <div class="score-circle">
        <span class="score-num" id="score-num">0</span>
        <span class="score-denom" id="score-denom">/ 11</span>
      </div>
      <h2 id="results-headline"></h2>
      <p id="results-subtext"></p>
      <button class="retake-btn" onclick="startQuiz()">Retake the quiz</button>
    </div>
  </div>

  <footer>Quiz based on headlines from May 18, 2026</footer>

  <script>
    const questions = [
      {
        q: "A new NYT/Siena poll shows just 30% of Americans support the decision to go to war with Iran. What share of independents called it the wrong decision?",
        choices: [
          "51%",
          "64%",
          "73%",
          "81%"
        ],
        answer: 2,
        explanation: "73% of independents called the decision to go to war with Iran the wrong decision — a striking number, and part of a broader finding that overall Trump approval has hit a second-term low, with 64% of all Americans opposing the war."
      },
      {
        q: "The Justice Department has created a compensation fund for Trump supporters who claim they were mistreated by Democratic administrations. How is this being described?",
        choices: [
          "A routine civil rights program expanded by the new administration",
          "A congressional initiative passed with bipartisan support",
          "A private charity managed outside of DOJ oversight",
          "A $1.8 billion fund with no modern precedent for this use of federal law enforcement resources"
        ],
        answer: 3,
        explanation: "The $1.8 billion DOJ fund for Trump allies is described as having no modern precedent — it is an unprecedented use of federal law enforcement resources to compensate political supporters who claim mistreatment by prior administrations."
      },
      {
        q: "Trump's pause on a Taiwan arms package is being called a \"strategic gift to China.\" What is the core concern about this decision?",
        choices: [
          "It signals to Beijing, Taipei, and allies that American security guarantees can be bargained away, undermining deterrence",
          "It frees up US weapons stockpiles needed for the Iran war",
          "It violates a standing treaty obligation with Taiwan",
          "It was done without congressional notification, creating a legal challenge"
        ],
        answer: 0,
        explanation: "Analysts say Trump's Taiwan arms delay signals that US security guarantees are negotiable — a message that undermines deterrence at a critical moment and benefits China strategically, even if no formal policy change was announced."
      },
      {
        q: "A new report estimates that over 100,000 American children have been separated from deported parents. Why do experts believe the official count is so much lower?",
        choices: [
          "Many deportations happen too quickly to be logged in federal databases",
          "The children are counted under a different agency's jurisdiction",
          "Parents are not being asked about or are not disclosing their American-citizen children",
          "Many families voluntarily chose separation to preserve the children's legal status"
        ],
        answer: 2,
        explanation: "The report finds that federal statistics dramatically undercount family separations because parents aren't being asked about — or aren't disclosing — their American-citizen children at the time of deportation."
      },
      {
        q: "US government borrowing costs have hit their highest level in 22 years. What year's levels does that match, and what is driving the surge?",
        choices: [
          "2001 levels, driven by post-9/11 defense spending",
          "2004 levels, driven by Iran war energy price inflation compounding fiscal pressures",
          "2000 levels, driven by the dot-com boom",
          "2008 levels, driven by the housing market crisis"
        ],
        answer: 1,
        explanation: "Bond yields have reached levels not seen since 2004, driven primarily by Iran war energy price inflation piling on top of existing fiscal pressures — a combination that is pushing government borrowing costs to a 22-year high."
      },
      {
        q: "The Iran war's economic toll has now reached $25 billion in costs for global companies. Which unexpected economic development is also part of this story?",
        choices: [
          "India's stock market has crashed to a 10-year low",
          "The euro has collapsed to parity with the dollar for the first time",
          "Saudi Arabia has announced it is cutting oil production by 50%",
          "China's economy has unexpectedly weakened, and mortgage costs are rising in North America and Europe"
        ],
        answer: 3,
        explanation: "Beyond the $25 billion corporate bill, the Iran war's economic spillover includes an unexpected weakening of China's economy and rising mortgage costs in North America and Europe — signs the conflict's economic damage is spreading globally."
      },
      {
        q: "Closed-door negotiations have revealed the US is pressing Greenland for what — going beyond a security partnership?",
        choices: [
          "A permanent US naval base on the island's east coast",
          "Exclusive mining rights to Greenland's rare earth deposits",
          "Operational control of the territory, leaving Greenland officials with little leverage to resist",
          "Greenland's formal accession to NATO as a US territory"
        ],
        answer: 2,
        explanation: "The US is pressing for operational control of Greenland — not just security partnerships — a demand that goes well beyond earlier public statements and leaves Greenland officials with very little leverage in the negotiations."
      },
      {
        q: "The US and Chinese readouts of the Trump–Xi Beijing summit contained meaningful contradictions. Which three topics did the diverging accounts disagree on?",
        choices: [
          "Iran, Taiwan, and trade commitments",
          "Climate, trade, and human rights",
          "North Korea, semiconductors, and military exercises",
          "Ukraine, fentanyl, and intellectual property"
        ],
        answer: 0,
        explanation: "The US and Chinese readouts of the summit diverged on Iran, Taiwan, and trade commitments — suggesting that less was actually resolved than was publicly projected by either side."
      },
      {
        q: "More than 60 Trump allies — including Steve Bannon — signed a letter calling for AI governance. What makes this notable?",
        choices: [
          "It is the first time Trump allies have called for any regulation of American businesses",
          "It calls for a complete moratorium on new AI model releases until 2027",
          "It demands that AI companies be nationalized to protect US interests",
          "It is the first organized right-wing push for AI governance, reframing the issue around American workers rather than safety"
        ],
        answer: 3,
        explanation: "The letter from 60+ Trump allies represents the first organized right-wing push for AI governance — notable because it reframes the AI oversight debate around protecting American workers rather than the traditional safety concerns raised by the left and by tech researchers."
      },
      {
        q: "Taiwan was excluded from the White House summary of the Trump–Xi summit. What does this diplomatic signal suggest?",
        choices: [
          "Taiwan's status was elevated to a separate bilateral track",
          "Taiwan requested its exclusion to avoid escalating tensions",
          "Congress blocked the administration from discussing Taiwan in summit readouts",
          "The White House is signaling US willingness to use Taiwan as leverage in broader negotiations with China"
        ],
        answer: 3,
        explanation: "Omitting Taiwan entirely from the White House summit readout is a significant diplomatic signal — widely interpreted as indicating US willingness to treat Taiwan as a bargaining chip in its relationship with China."
      },
      {
        q: "A surge in antisemitism targeting members of Congress has been documented. What political context is driving the increase?",
        choices: [
          "The political environment around the Iran war and Middle East policy",
          "A rise in far-right extremist groups unconnected to current policy debates",
          "Backlash over a Supreme Court ruling on religious freedom",
          "Controversy over a new congressional investigation into Israel"
        ],
        answer: 0,
        explanation: "The surge in antisemitic incidents targeting Jewish lawmakers is linked to the political environment around the Iran war and US Middle East policy — reflecting how the conflict has inflamed tensions in American political discourse."
      }
    ];

    const TOTAL = questions.length;
    let currentQ = 0;
    let score = 0;
    let answered = false;

    function startQuiz() {
      currentQ = 0;
      score = 0;
      answered = false;
      document.getElementById('results').classList.remove('show');
      document.getElementById('question-area').style.display = '';
      renderQuestion();
    }

    function renderQuestion() {
      answered = false;
      const q = questions[currentQ];
      const letters = ['A', 'B', 'C', 'D'];

      document.getElementById('q-label').textContent = `Question ${currentQ + 1} of ${TOTAL}`;
      document.getElementById('q-text').textContent = q.q;
      document.getElementById('progress-bar').style.width = `${(currentQ / TOTAL) * 100}%`;

      const feedback = document.getElementById('feedback');
      feedback.className = 'feedback';
      feedback.textContent = '';

      const nextBtn = document.getElementById('next-btn');
      nextBtn.className = 'next-btn';
      nextBtn.textContent = currentQ === TOTAL - 1 ? 'See Results' : 'Continue →';

      const choicesEl = document.getElementById('choices');
      choicesEl.innerHTML = '';

      q.choices.forEach((choice, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${choice}</span>`;
        btn.addEventListener('click', () => selectAnswer(i));
        choicesEl.appendChild(btn);
      });
    }

    function selectAnswer(idx) {
      if (answered) return;
      answered = true;

      const q = questions[currentQ];
      const buttons = document.querySelectorAll('.choice-btn');
      const feedback = document.getElementById('feedback');

      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.answer && idx !== q.answer) {
          btn.classList.add('reveal-correct');
        }
      });

      if (idx === q.answer) {
        score++;
        buttons[idx].classList.add('correct');
        feedback.className = 'feedback correct-fb show';
        feedback.innerHTML = `<strong>Correct!</strong> ${q.explanation}`;
      } else {
        buttons[idx].classList.add('wrong');
        feedback.className = 'feedback wrong-fb show';
        feedback.innerHTML = `<strong>Not quite.</strong> ${q.explanation}`;
      }

      document.getElementById('next-btn').classList.add('show');
    }

    document.getElementById('next-btn').addEventListener('click', () => {
      currentQ++;
      if (currentQ >= TOTAL) {
        showResults();
      } else {
        renderQuestion();
      }
    });

    function showResults() {
      document.getElementById('question-area').style.display = 'none';
      document.getElementById('progress-bar').style.width = '100%';

      const results = document.getElementById('results');
      results.classList.add('show');

      document.getElementById('score-num').textContent = score;
      document.getElementById('score-denom').textContent = `/ ${TOTAL}`;

      const pct = score / TOTAL;
      let headline, subtext;

      if (pct === 1) {
        headline = "Perfect score! 🎉";
        subtext = "Flawless. You read every headline today.";
      } else if (pct >= 0.8) {
        headline = "Excellent work!";
        subtext = "You're clearly on top of the news. Just a couple slipped by.";
      } else if (pct >= 0.6) {
        headline = "Well done!";
        subtext = "Solid performance — you know your way around today's headlines.";
      } else if (pct >= 0.4) {
        headline = "Not bad!";
        subtext = "A decent effort. The news cycle moves fast — try again to improve.";
      } else {
        headline = "Keep reading!";
        subtext = "Today was a big news day. Retake the quiz to lock in what you learned.";
      }

      document.getElementById('results-headline').textContent = headline;
      document.getElementById('results-subtext').textContent = subtext;
    }

    startQuiz();
  </script>

</body>
</html>
